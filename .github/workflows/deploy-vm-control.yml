name: Deploy VM Control (rsp-vm-control → Cloud Run)

on:
  push:
    branches:
      - main
    paths:
      - "apps/vm-control/**"
      - ".github/workflows/deploy-vm-control.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: rsp-vm-control
  IMAGE: ${{ secrets.AR_REPO }}/rsp-vm-control

jobs:
  deploy:
    name: Build & Deploy rsp-vm-control to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "full=${{ env.IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest=${{ env.IMAGE }}:latest" >> $GITHUB_OUTPUT

      - name: Write Dockerfile
        run: |
          cat > apps/vm-control/Dockerfile << 'DOCKEREOF'
          FROM node:22-slim
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci --omit=dev
          COPY server.js ./
          ENV NODE_ENV=production
          EXPOSE 8080
          CMD ["node", "server.js"]
          DOCKEREOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/vm-control
          push: true
          tags: |
            ${{ steps.tag.outputs.full }}
            ${{ steps.tag.outputs.latest }}
          cache-from: type=registry,ref=${{ steps.tag.outputs.latest }}
          cache-to: type=inline

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.tag.outputs.full }}
          flags: >-
            --no-allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=3
            --concurrency=5
            --timeout=600
            --service-account=rsp-vm-controller@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: >-
            TZ=Asia/Tokyo,
            GCP_PROJECT_ID=${{ env.PROJECT_ID }},
            GCE_ZONE=asia-northeast1-c,
            GCE_INSTANCE_NAME=obsserver-win01,
            GCE_MACHINE_TYPE=n1-standard-4
          secrets: >-
            SUPABASE_URL=supabase-url:latest,
            SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest

      - name: Show result
        run: echo "✅ Deployed: ${{ steps.deploy.outputs.url }}"
