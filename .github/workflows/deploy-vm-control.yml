name: Deploy VM Control (rsp-vm-control → Cloud Run)

on:
  push:
    branches:
      - main
    paths:
      - "apps/vm-control/**"
      - ".github/workflows/deploy-vm-control.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  AR_REPO: ${{ secrets.AR_REPO }}
  SERVICE_NAME: rsp-vm-control
  IMAGE_NAME: rsp-vm-control
  SA_CONTROLLER: rsp-vm-controller@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build & Deploy rsp-vm-control to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest_image=${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/vm-control
          file: apps/vm-control/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ steps.tag.outputs.latest_image }}
          cache-from: type=registry,ref=${{ steps.tag.outputs.latest_image }}
          cache-to: type=inline

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.tag.outputs.full_image }}
          flags: >-
            --no-allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=3
            --concurrency=5
            --timeout=600
            --service-account=${{ env.SA_CONTROLLER }}
          env_vars: >-
            TZ=Asia/Tokyo,
            GCP_PROJECT_ID=${{ env.PROJECT_ID }},
            GCE_ZONE=asia-northeast1-c,
            GCE_INSTANCE_NAME=obsserver-win01,
            GCE_MACHINE_TYPE=n1-standard-4
          secrets: >-
            SUPABASE_URL=supabase-url:latest,
            SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest

      - name: Verify deployment
        run: |
          echo "✅ Deployed: ${{ steps.deploy.outputs.url }}"
          echo "  Image: ${{ steps.tag.outputs.full_image }}"
          TOKEN=$(gcloud auth print-identity-token \
            --audiences="${{ steps.deploy.outputs.url }}" 2>/dev/null || echo "")
          if [ -n "$TOKEN" ]; then
            curl -sS "${{ steps.deploy.outputs.url }}/healthz" \
              -H "Authorization: Bearer $TOKEN" | python3 -m json.tool || true
          else
            echo "  (token 取得スキップ)"
          fi
